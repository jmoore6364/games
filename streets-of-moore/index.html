<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Streets of Moore</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="data:,">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #06060c;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    touch-action: none;
  }
  #hint {
    position: fixed; bottom: 6px; left: 0; right: 0;
    text-align: center; color: #667; font: 11px monospace;
    user-select: none;
  }
  #touch-ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  .tbtn {
    position: absolute; pointer-events: auto;
    width: 54px; height: 54px; border-radius: 50%;
    background: rgba(255,255,255,0.10); border: 2px solid rgba(120,200,255,0.4);
    color: #fff; font: bold 18px monospace;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  .tbtn.on { background: rgba(120,200,255,0.35); }
  .b-left  { left: calc(14px + env(safe-area-inset-left, 0px));  bottom: calc(34px + env(safe-area-inset-bottom, 0px)); }
  .b-right { left: calc(88px + env(safe-area-inset-left, 0px));  bottom: calc(34px + env(safe-area-inset-bottom, 0px)); }
  .b-up    { left: calc(51px + env(safe-area-inset-left, 0px));  bottom: calc(100px + env(safe-area-inset-bottom, 0px)); }
  .b-down  { left: calc(51px + env(safe-area-inset-left, 0px));  bottom: calc(0px + env(safe-area-inset-bottom, 0px)); height: 40px; }
  .b-attack{ right: calc(80px + env(safe-area-inset-right, 0px)); bottom: calc(34px + env(safe-area-inset-bottom, 0px)); font-size: 11px; }
  .b-jump  { right: calc(14px + env(safe-area-inset-right, 0px)); bottom: calc(64px + env(safe-area-inset-bottom, 0px)); font-size: 11px; }
  .b-spec  { right: calc(80px + env(safe-area-inset-right, 0px)); bottom: calc(104px + env(safe-area-inset-bottom, 0px)); font-size: 10px; border-color: rgba(255,120,160,0.5); }
  .b-back  { right: calc(14px + env(safe-area-inset-right, 0px)); bottom: calc(134px + env(safe-area-inset-bottom, 0px)); font-size: 10px; }
  .b-start { right: calc(14px + env(safe-area-inset-right, 0px)); top: 10px; width: 52px; height: 30px; border-radius: 8px; font-size: 12px; }
</style>
</head>
<body>
<canvas id="game" width="320" height="224"></canvas>
<div id="hint">P1 arrows/WASD move &middot; X attack &middot; Z jump &middot; X+Z special &middot; C back attack &middot; double-tap &rarr; run, +X blitz &middot; P2: IJKL + N/M/B &middot; Enter pause &middot; 0 mute</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
