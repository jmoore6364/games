<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Super Moore Bros</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #101018;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #6b8cff;
  }
  #hint {
    position: fixed; bottom: 8px; left: 0; right: 0;
    text-align: center; color: #556; font: 12px monospace;
    user-select: none;
  }
</style>
</head>
<body>
<canvas id="game" width="256" height="240"></canvas>
<div id="hint">arrows/WASD move &nbsp;·&nbsp; Z/Space jump &nbsp;·&nbsp; X/Shift run+fire &nbsp;·&nbsp; Enter start/pause &nbsp;·&nbsp; M mute</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
