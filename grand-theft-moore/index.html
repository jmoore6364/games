<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Grand Theft Moore</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="data:,">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #05060c;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; touch-action: none; overscroll-behavior: none; font-family: monospace; }
  #view { image-rendering: pixelated; image-rendering: crisp-edges;
    background: #10131a; max-width: 100vw; max-height: 100vh; cursor: crosshair; }
  #touch-ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: none; }
  .stick-zone, .look-zone, .tbtn { position: absolute; pointer-events: auto; touch-action: none;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
  #move-stick { left: 18px; bottom: 20px; width: 120px; height: 120px; border-radius: 50%;
    background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.25); }
  #move-knob { position: absolute; left: 50%; top: 50%; width: 52px; height: 52px; border-radius: 50%;
    transform: translate(-26px,-26px); background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.4); }
  #look-zone { right: 0; top: 0; width: 55%; height: 60%; }
  .tbtn { width: 60px; height: 60px; border-radius: 50%;
    background: rgba(255,255,255,0.10); border: 2px solid rgba(255,255,255,0.32);
    color: #fff; font: bold 12px monospace; display: flex; align-items: center; justify-content: center; }
  .tbtn:active { background: rgba(255,255,255,0.30); }
  #b-enter  { right: 18px;  bottom: 100px; }
  #b-action { right: 90px;  bottom: 40px; }
  #b-hand   { right: 18px;  bottom: 30px; }
  #hint { position: fixed; bottom: 3px; left: 0; right: 0; text-align: center;
    color: #667; font: 11px monospace; pointer-events: none; }
</style>
</head>
<body>
<canvas id="view"></canvas>
<div id="touch-ui">
  <div id="move-stick" class="stick-zone"><div id="move-knob"></div></div>
  <div id="look-zone" class="look-zone"></div>
  <div id="b-enter" class="tbtn">F</div>
  <div id="b-action" class="tbtn">HIT</div>
  <div id="b-hand" class="tbtn">HB</div>
</div>
<div id="hint">WASD move · mouse/Q·E look · F enter/exit car · Space handbrake/jump · J punch · V view · R radio · M mute · ENTER start</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
