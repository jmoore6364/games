<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Grand Theft Moore</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="data:,">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #05060c;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; touch-action: none; overscroll-behavior: none; font-family: monospace; }
  #view { image-rendering: pixelated; image-rendering: crisp-edges;
    background: #10131a; max-width: 100vw; max-height: 100vh; cursor: crosshair; }
  #touch-ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; display: none;
    --sal: env(safe-area-inset-left, 0px);  --sar: env(safe-area-inset-right, 0px);
    --sab: env(safe-area-inset-bottom, 0px); --sat: env(safe-area-inset-top, 0px); }
  .stick-zone, .look-zone, .tbtn { position: absolute; pointer-events: auto; touch-action: none;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
  /* --- twin sticks: left = move, right = look. Both LIFTED 96px off the
         bottom edge so the OS home-bar / gesture strip can't eat the touch. --- */
  .stick-zone { width: 120px; height: 120px; border-radius: 50%;
    background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.25);
    bottom: calc(96px + var(--sab)); }
  #move-stick { left: calc(18px + var(--sal)); }
  #look-stick { right: calc(18px + var(--sar)); }
  #move-knob, #look-knob { position: absolute; left: 50%; top: 50%; width: 50px; height: 50px; border-radius: 50%;
    transform: translate(-25px,-25px); background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.4); }
  #look-knob { background: rgba(120,180,255,0.28); border-color: rgba(150,200,255,0.55); }
  /* legacy upper-right drag-look zone (secondary; right stick is primary) */
  #look-zone { right: 0; top: calc(var(--sat)); width: 50%; height: 42%; }
  .tbtn { width: 66px; height: 66px; border-radius: 50%;
    background: rgba(255,255,255,0.12); border: 2px solid rgba(255,255,255,0.34);
    color: #fff; font: bold 12px monospace; display: flex; align-items: center; justify-content: center; }
  .tbtn.big { width: 94px; height: 94px; font-size: 15px; }
  .tbtn:active { background: rgba(255,255,255,0.40); }
  /* enter/exit F — same slot in both modes, upper-right, clear of the look stick */
  #b-enter  { right: calc(22px + var(--sar));  bottom: calc(234px + var(--sab)); }
  /* on-foot cluster — central column between the sticks (big JUMP low, HIT above) */
  #b-jump   { right: calc(144px + var(--sar)); bottom: calc(108px + var(--sab));
    background: rgba(120,180,255,0.16); border-color: rgba(150,200,255,0.55); }
  #b-jump:active { background: rgba(120,180,255,0.42); }
  #b-action { right: calc(150px + var(--sar)); bottom: calc(220px + var(--sab)); }
  /* driving cluster — GAS/BRAKE stacked in the central gap, HAND upper-left, F upper-right */
  #b-gas    { right: calc(148px + var(--sar)); bottom: calc(108px + var(--sab));
    background: rgba(80,220,120,0.16); border-color: rgba(90,230,130,0.55); }
  #b-gas:active { background: rgba(80,220,120,0.42); }
  #b-brake  { right: calc(150px + var(--sar)); bottom: calc(214px + var(--sab));
    background: rgba(235,90,80,0.16); border-color: rgba(240,110,100,0.55); }
  #b-brake:active { background: rgba(235,90,80,0.42); }
  #b-hand   { left: calc(22px + var(--sal));   bottom: calc(234px + var(--sab)); }
  .drive-btn { display: none; }
  #hint { position: fixed; bottom: 3px; left: 0; right: 0; text-align: center;
    color: #667; font: 11px monospace; pointer-events: none; }
</style>
</head>
<body>
<canvas id="view"></canvas>
<div id="touch-ui">
  <div id="move-stick" class="stick-zone"><div id="move-knob"></div></div>
  <div id="look-stick" class="stick-zone"><div id="look-knob"></div></div>
  <div id="look-zone" class="look-zone"></div>
  <div id="b-enter" class="tbtn">F</div>
  <!-- on foot -->
  <div id="b-jump" class="tbtn big foot-btn">JUMP</div>
  <div id="b-action" class="tbtn foot-btn">HIT</div>
  <!-- driving -->
  <div id="b-gas" class="tbtn big drive-btn">GAS</div>
  <div id="b-brake" class="tbtn big drive-btn">BRAKE</div>
  <div id="b-hand" class="tbtn drive-btn">HAND</div>
</div>
<div id="hint">WASD move · mouse/Q·E look · F enter/exit car · Space handbrake/jump · J punch · V view · R radio · M mute · ENTER start · (or tap to play on touch)</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
