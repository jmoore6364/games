<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Diablmoore</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="data:,">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #05060a;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    touch-action: none; overscroll-behavior: none;
    font-family: monospace; color: #c9b98a; }
  #wrap { position: relative; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; background: #05060a;
    cursor: crosshair; display: block;
    width: min(100vw, 133.33vh); height: min(75vw, 100vh); }
  #touch { position: absolute; inset: 0; pointer-events: none; display: none; }
  .tb { position: absolute; pointer-events: auto; width: 46px; height: 46px; border-radius: 8px;
    background: rgba(30,20,14,0.7); border: 2px solid #6a5030; color: #e8c98a;
    font: bold 14px monospace; display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
  .tb:active { background: rgba(80,50,20,0.8); }
  #tb-i { right: 8px; top: 8px; } #tb-c { right: 8px; top: 60px; }
  #tb-r { right: 8px; bottom: 60px; } #tb-1 { left: 8px; bottom: 8px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="touch">
    <div class="tb" id="tb-i">I</div>
    <div class="tb" id="tb-c">C</div>
    <div class="tb" id="tb-r">R</div>
    <div class="tb" id="tb-1">1</div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
<script>
  // show touch buttons on touch devices; wire them to synthetic keys
  if ('ontouchstart' in window) {
    const t = document.getElementById('touch'); t.style.display = 'block';
    const key = (k) => window.dispatchEvent(new KeyboardEvent('keydown', { key: k }));
    document.getElementById('tb-i').addEventListener('touchstart', (e) => { e.preventDefault(); key('i'); });
    document.getElementById('tb-c').addEventListener('touchstart', (e) => { e.preventDefault(); key('c'); });
    document.getElementById('tb-1').addEventListener('touchstart', (e) => { e.preventDefault(); key('1'); });
    // R button = secondary skill toward player-front handled via right-click emulation is limited on touch;
    // documented as basic in README.
  }
</script>
</body>
</html>
