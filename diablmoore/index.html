<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Diablmoore</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="data:,">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #05060a;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    touch-action: none; overscroll-behavior: none;
    font-family: monospace; color: #c9b98a; }
  #wrap { position: relative; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges; background: #05060a;
    cursor: crosshair; display: block;
    width: min(100vw, 133.33vh); height: min(75vw, 100vh); }

  /* ---- touch overlay: full-viewport, buttons live in the letterbox / safe area ---- */
  #touch { position: fixed; inset: 0; pointer-events: none; display: none; z-index: 10;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  .tbtn { position: absolute; pointer-events: auto; box-sizing: border-box;
    display: flex; align-items: center; justify-content: center; text-align: center;
    border-radius: 12px; background: rgba(28,20,14,0.72); border: 2px solid #6a5030; color: #e8c98a;
    font: bold 12px monospace; line-height: 1.05;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
  .tbtn.act { background: rgba(90,58,22,0.9); transform: scale(0.94); }

  /* small utility buttons: top-right column */
  .tbtn.util { width: 48px; height: 44px; right: calc(env(safe-area-inset-right) + 12px); }
  #tb-i   { top: calc(env(safe-area-inset-top) + 14px); }
  #tb-c   { top: calc(env(safe-area-inset-top) + 66px); }
  #tb-map { top: calc(env(safe-area-inset-top) + 118px); }

  /* combat cluster: right thumb */
  #tb-skill { width: 82px; height: 82px; border-radius: 50%;
    right: calc(env(safe-area-inset-right) + 16px); bottom: calc(env(safe-area-inset-bottom) + 24px);
    border-color: #b05020; color: #ffcf9a; font-size: 13px;
    background: radial-gradient(circle at 40% 35%, rgba(120,60,20,0.85), rgba(40,22,10,0.85)); }
  #tb-mp { width: 58px; height: 58px; border-radius: 50%;
    right: calc(env(safe-area-inset-right) + 28px); bottom: calc(env(safe-area-inset-bottom) + 118px);
    border-color: #3a5aa0; color: #cfe0ff;
    background: radial-gradient(circle at 40% 35%, rgba(40,70,160,0.85), rgba(14,22,60,0.85)); }

  /* potion: left thumb (near the health orb) */
  #tb-hp { width: 58px; height: 58px; border-radius: 50%;
    left: calc(env(safe-area-inset-left) + 20px); bottom: calc(env(safe-area-inset-bottom) + 24px);
    border-color: #a03030; color: #ffd0d0;
    background: radial-gradient(circle at 40% 35%, rgba(150,40,40,0.85), rgba(60,14,14,0.85)); }

  .tbtn small { display: block; font-size: 8px; opacity: 0.85; font-weight: normal; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
</div>
<div id="touch">
  <div class="tbtn util" id="tb-i">INV</div>
  <div class="tbtn util" id="tb-c">CHAR</div>
  <div class="tbtn util" id="tb-map">MAP</div>
  <div class="tbtn" id="tb-skill">SKILL</div>
  <div class="tbtn" id="tb-mp">MANA<small>potion</small></div>
  <div class="tbtn" id="tb-hp">LIFE<small>potion</small></div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
