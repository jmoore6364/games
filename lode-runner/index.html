<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lode Runner: Moore's Gold</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23000'/><path d='M2 13h12v3H2z' fill='%23a83820'/><path d='M5 8h6v3H5z' fill='%23ffd020'/></svg>">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #06060c; color: #dde;
    font-family: monospace;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #wrap {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    max-width: 100vw;
    max-height: calc(100vh - 90px);
  }
  #touch {
    display: none;
    width: 100%; max-width: 700px;
    justify-content: space-between;
    padding: 0 12px 10px; box-sizing: border-box;
  }
  .pad { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); gap: 2px; }
  .digs { display: flex; gap: 10px; align-items: flex-end; }
  .tbtn {
    background: #1a1a2c; border: 2px solid #445; border-radius: 8px;
    color: #ccd; font: bold 16px monospace;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .tbtn:active, .tbtn.on { background: #2e2e4e; border-color: #f8d848; }
  .digs .tbtn { width: 64px; height: 64px; font-size: 13px; }
  .hint { color: #667; font-size: 11px; text-align: center; padding-bottom: 6px; }
  @media (pointer: coarse) {
    #touch { display: flex; }
    .hint { display: none; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="672" height="416"></canvas>
  <div class="hint">arrows/WASD move &middot; Z dig left &middot; X dig right &middot; Enter start/pause &middot; M mute &middot; R restart level</div>
  <div id="touch">
    <div class="pad">
      <div></div><div class="tbtn" data-k="up">&#9650;</div><div></div>
      <div class="tbtn" data-k="left">&#9664;</div><div></div><div class="tbtn" data-k="right">&#9654;</div>
      <div></div><div class="tbtn" data-k="down">&#9660;</div><div></div>
    </div>
    <div class="digs">
      <div class="tbtn" data-k="digL">DIG&#9698;</div>
      <div class="tbtn" data-k="start">START</div>
      <div class="tbtn" data-k="digR">&#9699;DIG</div>
    </div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
