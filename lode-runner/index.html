<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lode Runner: Moore's Gold</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#06060c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lode Runner">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png" type="image/png">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #06060c; color: #dde;
    font-family: monospace;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
  }
  #wrap {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    max-width: 100vw;
    max-height: calc(100vh - 90px);
    max-height: calc(100dvh - 90px);
  }
  #touch {
    display: none;
    width: 100%; max-width: 700px;
    justify-content: space-between;
    padding: 0 12px 10px; box-sizing: border-box;
  }
  .pad { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); gap: 2px; }
  .digs { display: flex; gap: 10px; align-items: flex-end; }
  .tbtn {
    background: #1a1a2c; border: 2px solid #445; border-radius: 8px;
    color: #ccd; font: bold 16px monospace;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .tbtn:active, .tbtn.on { background: #2e2e4e; border-color: #f8d848; }
  .digs .tbtn { width: 64px; height: 64px; font-size: 13px; }
  .hint { color: #667; font-size: 11px; text-align: center; padding-bottom: 6px; }
  #editor-ui {
    display: none; flex-direction: column; gap: 6px;
    width: 100%; max-width: 700px; padding: 0 8px 10px; box-sizing: border-box;
  }
  /* builder mode: hide play controls, allow scrolling to the toolbar,
     keep the board itself paintable (no scroll gestures on it) */
  body.editing { overflow: auto; touch-action: pan-y; }
  body.editing #wrap { height: auto; min-height: 100%; justify-content: flex-start; }
  body.editing #touch, body.editing .hint { display: none !important; }
  body.editing canvas { touch-action: none; }
  @media (pointer: coarse) {
    body.editing canvas { max-height: none; }
  }
  .led-row { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
  .led-btn {
    background: #1a1a2c; border: 2px solid #445; border-radius: 6px;
    color: #ccd; font: bold 11px monospace; padding: 6px 8px;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .led-btn:hover { border-color: #778; }
  .led-btn.sel { border-color: #f8d848; color: #f8d848; }
  .led-btn.go { border-color: #2e8; color: #8fc; }
  .led-btn.warn { border-color: #a44; color: #faa; }
  #led-name, #led-load {
    background: #101020; border: 2px solid #445; border-radius: 6px;
    color: #eee; font: bold 12px monospace; padding: 5px 8px; max-width: 160px;
  }
  #led-import {
    display: none; position: fixed; inset: 0; z-index: 10;
    background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
  }
  .led-modal {
    background: #14141f; border: 2px solid #556; border-radius: 8px;
    padding: 16px; width: min(520px, 92vw); color: #ccd; font-size: 13px;
  }
  .led-modal textarea {
    width: 100%; height: 120px; box-sizing: border-box; margin: 8px 0;
    background: #0b0b14; color: #cd8; border: 1px solid #445; font: 11px monospace;
  }
  .led-modal div { display: flex; gap: 8px; justify-content: flex-end; }
  @media (pointer: coarse) {
    #touch { display: flex; }
    .hint { display: none; }
    canvas {
      max-height: calc(100vh - 210px);
      max-height: calc(100dvh - 210px);
    }
  }
  /* phones in landscape: controls float over the sides so the board gets the full height */
  @media (pointer: coarse) and (orientation: landscape) {
    canvas {
      max-height: 100vh;
      max-height: 100dvh;
    }
    #touch {
      position: fixed; left: 0; right: 0;
      bottom: calc(8px + env(safe-area-inset-bottom));
      max-width: none;
      padding: 0 calc(12px + env(safe-area-inset-right)) 0 calc(12px + env(safe-area-inset-left));
      pointer-events: none;
      z-index: 2;
    }
    #touch .tbtn { pointer-events: auto; opacity: 0.72; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="672" height="416"></canvas>
  <div class="hint">arrows/WASD move &middot; Z dig left &middot; X dig right &middot; Enter start/pause &middot; M mute &middot; R restart level</div>
  <div id="touch">
    <div class="pad">
      <div></div><div class="tbtn" data-k="up">&#9650;</div><div></div>
      <div class="tbtn" data-k="left">&#9664;</div><div></div><div class="tbtn" data-k="right">&#9654;</div>
      <div></div><div class="tbtn" data-k="down">&#9660;</div><div></div>
    </div>
    <div class="digs">
      <div class="tbtn" data-k="digL">DIG&#9698;</div>
      <div class="tbtn" data-k="start">START</div>
      <div class="tbtn" data-k="digR">&#9699;DIG</div>
    </div>
  </div>
</div>
<script>
  if ('serviceWorker' in navigator) {
    addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    // When an updated service worker takes control, reload so the new
    // version shows immediately instead of on the next launch. Skipped on
    // first-ever install (page is already fresh) and while mid-game.
    let hadController = !!navigator.serviceWorker.controller;
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!hadController) { hadController = true; return; }
      if (reloaded) return;
      // reload as soon as it's safe: immediately at launch, otherwise the
      // next time the player is back on a menu screen (never mid-game)
      const tryReload = () => {
        if (reloaded) return;
        const st = window.lodeRunner && window.lodeRunner.state;
        if (performance.now() < 15000 || st === 'title' || st === 'levels') {
          reloaded = true;
          location.reload();
        } else setTimeout(tryReload, 3000);
      };
      tryReload();
    });
  }
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
