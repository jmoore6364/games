<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shining Moore</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="data:,">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #050508;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    touch-action: none;
    overscroll-behavior: none;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    touch-action: none;
  }
  #hint {
    position: fixed; bottom: 8px; left: 0; right: 0;
    text-align: center; color: #556; font: 12px monospace;
    user-select: none;
  }
  #touch-ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  .tbtn {
    position: absolute; pointer-events: auto;
    width: 54px; height: 54px; border-radius: 50%;
    background: rgba(255,255,255,0.10); border: 2px solid rgba(255,255,255,0.32);
    color: #fff; font: bold 20px monospace;
    display: flex; align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  .tbtn.on { background: rgba(255,255,255,0.35); }
  .dpad {
    position: absolute; pointer-events: none;
    left: calc(16px + env(safe-area-inset-left, 0px));
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    width: 144px; height: 144px;
  }
  .dbtn { width: 46px; height: 46px; border-radius: 10px; font-size: 14px; }
  .d-up    { left: 49px; top: 0; }
  .d-down  { left: 49px; bottom: 0; }
  .d-left  { left: 0; top: 49px; }
  .d-right { right: 0; top: 49px; }
  .b-b { right: calc(84px + env(safe-area-inset-right, 0px)); bottom: calc(28px + env(safe-area-inset-bottom, 0px)); }
  .b-a { right: calc(18px + env(safe-area-inset-right, 0px)); bottom: calc(64px + env(safe-area-inset-bottom, 0px)); }
  .b-start { right: calc(14px + env(safe-area-inset-right, 0px)); top: 10px; width: 52px; height: 30px; border-radius: 8px; font-size: 12px; }
</style>
</head>
<body>
<canvas id="game" width="320" height="224"></canvas>
<div id="hint">arrows/WASD cursor &nbsp;&middot;&nbsp; Z confirm &nbsp;&middot;&nbsp; X cancel/inspect &nbsp;&middot;&nbsp; Enter fast mode &nbsp;&middot;&nbsp; M mute</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
