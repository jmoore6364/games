<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>StarMoore</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="icon" href="data:,">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #05070d;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; touch-action: none; overscroll-behavior: none;
    font-family: monospace;
  }
  #wrap { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  canvas {
    image-rendering: pixelated; image-rendering: crisp-edges;
    background: #05070d; touch-action: none; cursor: crosshair;
    max-width: 100vw; max-height: 100vh;
    width: min(100vw, calc(100vh * 1.6));
    height: auto; aspect-ratio: 640 / 400;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="640" height="400"></canvas>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
